# AMQP is available only over TLS. The CA is also used to validate
# client certificates, making the connection mutual TLS (mTLS).
listeners.tcp = none
listeners.ssl.default = 5671

ssl_options.cacertfile = /etc/rabbitmq/tls/ca.crt
ssl_options.certfile = /etc/rabbitmq/tls/server.crt
ssl_options.keyfile = /etc/rabbitmq/tls/server.key
ssl_options.verify = verify_peer
ssl_options.fail_if_no_peer_cert = true

# Authenticate AMQP clients with their TLS certificate (CN -> RabbitMQ user).
# Password logins are deliberately not offered on the AMQP listener.
auth_mechanisms.1 = EXTERNAL
ssl_cert_login_from = common_name

# Users and their resource permissions are declarative and survive restarts.
load_definitions = /etc/rabbitmq/definitions.json

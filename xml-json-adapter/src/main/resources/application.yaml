spring:
  application:
    name: xml-json-adapter
  jms:
    cache:
      session-cache-size: 32
    listener:
      min-concurrency: 2
      max-concurrency: 4
  rabbitmq:
    host: rabbitmq
    port: 5671
    username: user
    password: password
    ssl:
      enabled: true
      key-store: file:/run/tls/client.p12
      key-store-password: changeit
      key-store-type: PKCS12
      trust-store: file:/run/tls/truststore.p12
      trust-store-password: changeit
      trust-store-type: PKCS12
      validate-server-certificate: true
      verify-hostname: true
    listener:
      simple:
        concurrency: 8
        max-concurrency: 32
        prefetch: 8
  threads:
    virtual:
      enabled: true
  ssl:
    bundle:
      jks:
        ibmmq:
          keystore:
            location: file:/run/ibmmq-tls/client.p12
            password: changeit
            type: PKCS12
          truststore:
            location: file:/run/ibmmq-tls/truststore.p12
            password: changeit
            type: PKCS12

ibm:
  mq:
    queue-manager: QM1
    conn-name: ibmmq(1414)
    channel: MTLS.APP.SVRCONN
    user: app
    password: password
    ssl-bundle: ibmmq
    ssl-cipher-suite: "*TLS12ORHIGHER"
    ssl-peer-name: CN=ibmmq,O=vedoc POC,C=DE

services:

  mongodb:
    image: mongo:7.0.34-jammy
    container_name: mongodb
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    healthcheck:
      test: >
        mongosh --quiet --eval
        'try { rs.status().ok } catch (e) { rs.initiate({_id: "rs0", members: [{ _id: 0, host: "mongodb:27017" }] }).ok }'
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    build:
      context: ./rabbitmq
    container_name: rabbitmq
    ports:
      - "5671:5671"   # AMQP over mTLS
      - "15672:15672" # Management UI
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq-definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./certs/ca/poc-ca.crt:/etc/rabbitmq/tls/ca.crt:ro
      - ./certs/rabbitmq/server.crt:/etc/rabbitmq/tls/server.crt:ro
      - ./certs/rabbitmq/server.key:/etc/rabbitmq/tls/server.key:ro
  
  ibmmq:
    image: jan310/ibm-mqadvanced-server-dev:9.4.5.1-arm64
    container_name: ibmmq
    ports:
      - "1414:1414"   # IBM MQ
      - "9443:9443"   # Management UI (via https)
    environment:
      LICENSE: accept
      MQ_QMGR_NAME: QM1
      MQ_APP_PASSWORD: password # user = app
      MQ_ADMIN_PASSWORD: password # user = admin
    volumes:
      - ./config.mqsc:/etc/mqm/config.mqsc
      - ./certs/ibmmq:/etc/mqm/pki/keys/ibmmq:ro
      - ./certs/ca/poc-ca.crt:/etc/mqm/pki/trust/poc-ca/ca.crt:ro

  vedoc:
    build:
      context: ./vedoc
    container_name: vedoc
    ports:
      - "8080:8080"
    volumes:
      - ./certs/clients/vedoc-rabbit/client.p12:/run/tls/client.p12:ro
      - ./certs/truststore.p12:/run/tls/truststore.p12:ro
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_started

  xml-json-adapter:
    build:
      context: ./xml-json-adapter
    container_name: xml-json-adapter
    volumes:
      - ./certs/clients/xml-json-adapter-rabbit/client.p12:/run/tls/client.p12:ro
      - ./certs/truststore.p12:/run/tls/truststore.p12:ro
      - ./certs/clients/xml-json-adapter-ibmmq/client.p12:/run/ibmmq-tls/client.p12:ro
      - ./certs/truststore.p12:/run/ibmmq-tls/truststore.p12:ro
    depends_on:
      rabbitmq:
        condition: service_started
      ibmmq:
        condition: service_started
      vedoc:
        condition: service_started
